<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сфера: Орбиты и Тени</title>
    <style>
        canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
}
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 12px;
            user-select: none;
            width: 260px;
            z-index: 10;
        }
        input[type="range"] { width: 100%; cursor: pointer; margin: 10px 0; }
        .label { font-weight: bold; margin-bottom: 5px; display: block; color: #ccc; }
        .mode-option { 
            margin-top: 12px; 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            font-size: 14px;
        }
        .mode-option input { margin-right: 10px; }
        #speedVal { font-weight: bold; color: #fff; }
        hr { border: 0; border-top: 1px solid #444; margin: 15px 0; }
    </style>
</head>
<body>

<div id="ui">
    <span class="label">Линейная скорость: <span id="speedVal">0.3</span></span>
    <input type="range" id="speedRange" min="0" max="3" step="0.1" value="0.3">
    
    <hr>
    
    <span class="label">Режим вращения:</span>
    <label class="mode-option">
        <input type="radio" name="mode" value="1" checked> 1. Твердое тело
    </label>
    <label class="mode-option">
        <input type="radio" name="mode" value="2"> 2. Ускорение к полюсам
    </label>
    <label class="mode-option">
        <input type="radio" name="mode" value="3"> 3. Замедление к полюсам
    </label>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- Сцена и Рендерер ---
    const width = window.innerWidth;
const height = window.innerHeight;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
    camera.position.set(6, 5, 8);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    // Включаем поддержку теней
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // --- Параметры ---
    const radius = 3;
    let speedMult = 0.3;
    let baseAngle = 0;
    let currentMode = "1";
    const dots = [];

    // --- Свет с тенями ---
    const mainLight = new THREE.DirectionalLight(0xffffff, 2);
    mainLight.position.set(5, 8, 5);
    mainLight.castShadow = true;
    // Настройка области теней для лучшего качества
    mainLight.shadow.camera.left = -5;
    mainLight.shadow.camera.right = 5;
    mainLight.shadow.camera.top = 5;
    mainLight.shadow.camera.bottom = -5;
    mainLight.shadow.mapSize.width = 1024;
    mainLight.shadow.mapSize.height = 1024;
    scene.add(mainLight);
    
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    // --- Объекты ---

    // Сфера (принимает и отбрасывает тени)
    const sphereGeometry = new THREE.SphereGeometry(radius * 0.98, 64, 64);
    const sphereMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xdddddd,
        roughness: 0.5,
        metalness: 0.1
    });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    sphere.castShadow = true;
    sphere.receiveShadow = true;
    scene.add(sphere);

    // Создание точек и их орбит
    for (let latDeg = -85; latDeg <= 85; latDeg += 5) { 
        const latRad = latDeg * (Math.PI / 180);
        const rParallel = radius * Math.cos(latRad);
        const yPos = radius * Math.sin(latRad);

        // 1. Рисуем орбиту (кольцо)
        if (rParallel > 0.1) {
            const curve = new THREE.EllipseCurve(0, 0, rParallel, rParallel);
            const points = curve.getPoints(64);
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({ 
                color: 0x444444, 
                transparent: true, 
                opacity: 0.3 
            });
            const orbit = new THREE.LineLoop(geometry, material);
            orbit.rotation.x = Math.PI / 2; // Кладем кольцо горизонтально
            orbit.position.y = yPos;
            scene.add(orbit);
        }

        // 2. Создаем точку
        const dotGeometry = new THREE.SphereGeometry(0.08, 16, 16);
    
    // Вычисляем оттенок (Hue) на основе широты
    // Превращаем диапазон latDeg [-85, 85] в диапазон [0, 1]
    const hue = (latDeg + 85) / 170; 
    const rainbowColor = new THREE.Color().setHSL(hue, 0.8, 0.5);

    const dotMaterial = new THREE.MeshStandardMaterial({ 
        color: rainbowColor, 
        roughness: 0.3,
        metalness: 0.2 
    });
        const mesh = new THREE.Mesh(dotGeometry, dotMaterial);
        //mesh.castShadow = true; // Точка отбрасывает тень на сферу
        scene.add(mesh);

        dots.push({
           mesh: mesh,
            latRad: latRad,
            rParallel: rParallel,
            yPos: yPos
        });
    }

    // --- Управление ---
    const speedInput = document.getElementById('speedRange');
    const speedDisplay = document.getElementById('speedVal');
    const modeInputs = document.querySelectorAll('input[name="mode"]');

    speedInput.addEventListener('input', (e) => {
        speedMult = parseFloat(e.target.value);
        speedDisplay.innerText = speedMult.toFixed(1);
    });

    modeInputs.forEach(input => {
        input.addEventListener('change', (e) => {
            currentMode = e.target.value;
            baseAngle = 0; 
        });
    });

    // --- Цикл анимации ---
    function animate() {
        requestAnimationFrame(animate);

        const delta = 0.015 * speedMult;
        baseAngle += delta;

        dots.forEach(dot => {
            let angle;
            const cosLat = Math.cos(dot.latRad);

            switch(currentMode) {
                case "1": 
                    angle = baseAngle;
                    break;
                case "2": 
                    angle = baseAngle / Math.max(cosLat, 0.1); 
                    break;
                case "3": 
                    angle = baseAngle * cosLat;
                    break;
            }

            dot.mesh.position.x = Math.cos(angle) * dot.rParallel;
            dot.mesh.position.z = Math.sin(angle) * dot.rParallel;
            dot.mesh.position.y = dot.yPos;
        });

        controls.update();
        renderer.render(scene, camera);
    }

   function onWindowResize() {
    const w = window.innerWidth;
    const h = window.innerHeight;
    
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    
    renderer.setSize(w, h);
    // Устанавливаем размер с учетом плотности пикселей (для четкости)
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
}

window.addEventListener('resize', onWindowResize);
    setTimeout(onWindowResize, 100);

    animate();
</script>
</body>
</html>
