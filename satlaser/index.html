<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Orbital Ground Tracks</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050508; color: white; font-family: sans-serif; }
        #info { 
            position: absolute; top: 20px; left: 20px; 
            background: rgba(0,0,0,0.8); padding: 15px; 
            border-radius: 10px; border: 1px solid #444; pointer-events: none;
        }
        .legend { margin-bottom: 5px; display: flex; align-items: center; }
        .dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 10px; }
    </style>
</head>
<body>
    <div id="time-panel" style="position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 10px; border: 1px solid #444; text-align: center; min-width: 150px;">
    <div id="clock" style="font-size: 24px; font-family: monospace; color: #00ff00; margin-bottom: 10px;">00:00:00</div>
    <button id="pauseBtn" style="padding: 8px 20px; cursor: pointer; background: #444; color: white; border: none; border-radius: 5px;">Пауза</button>
</div>

<div id="info">
    <h4>Трассы спутников (h = 35786 км)</h4>
    <div class="legend"><div class="dot" style="background: #ff4444;"></div> Красный: 0° (ГСО)</div>
    <div class="legend"><div class="dot" style="background: #4444ff;"></div> Синий: 180° (Ретроград)</div>
    <div class="legend"><div class="dot" style="background: #44ff44;"></div> Зеленый: 5°</div>
    <div class="legend"><div class="dot" style="background: #ffff44;"></div> Желтый: 10°</div>
    <p style="font-size: 0.8em; opacity: 0.7;">Линии рисуются на поверхности в реальном времени.</p>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const R_EARTH = 6371.008; // Средний радиус IUGG
const GM = 398600.4418;    // Геоцентрическая гравитационная постоянная
const OMEGA_EARTH = 7.2921159e-5; // Угловая скорость вращения Земли (рад/с)
let isPaused = false;
let totalSimulatedSeconds = 0; // Время в симуляции (в секундах)

// Слушатель кнопки
document.getElementById('pauseBtn').addEventListener('click', (e) => {
    isPaused = !isPaused;
    e.target.innerText = isPaused ? 'Пуск' : 'Пауза';
    e.target.style.background = isPaused ? '#225522' : '#444';
});


// Точный расчет радиуса ГСО
const R_GEO = Math.pow(GM / Math.pow(OMEGA_EARTH, 2), 1/3); 
const EXACT_HEIGHT = R_GEO - R_EARTH;
    const VIEW_SCALE = 1/1000;
    const ALTITUDE = 35786;
console.log("Точная высота ГСО:", EXACT_HEIGHT);
    // Инициализация сцены
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);
    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(40, 20, 40);

    // Свет
    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(50, 20, 50);
    scene.add(sun, new THREE.AmbientLight(0x444444));

    // Создание холста для рисования путей
    const canvas = document.createElement('canvas');
    canvas.width = 2048;
    canvas.height = 1024;
    const ctx = canvas.getContext('2d');
    const trackTexture = new THREE.CanvasTexture(canvas);

    // Земля
    const earthGroup = new THREE.Group();
    const earthGeom = new THREE.SphereGeometry(R_EARTH * VIEW_SCALE, 64, 64);
    
    // Основная текстура Земли
    const earthMat = new THREE.MeshPhongMaterial({
        map: new THREE.TextureLoader().load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg'),
    });
    const earthBody = new THREE.Mesh(earthGeom, earthMat);
    earthGroup.add(earthBody);

    // Слой для отрисовки путей (чуть больше радиусом, чтобы не было мерцания)
    const trackMat = new THREE.MeshBasicMaterial({ map: trackTexture, transparent: true, opacity: 1 });
    const trackLayer = new THREE.Mesh(new THREE.SphereGeometry(R_EARTH * VIEW_SCALE * 1.005, 64, 64), trackMat);
    earthGroup.add(trackLayer);
    
    scene.add(earthGroup);

    // Функция создания спутника
    function createSat(color, inclinationDeg, traceSize, altitude, startAngleDeg) {
    const orbitPivot = new THREE.Group(); 
    orbitPivot.rotation.z = THREE.MathUtils.degToRad(inclinationDeg);
    
    const satGroup = new THREE.Group(); 
    // Устанавливаем начальный угол поворота спутника на орбите
    satGroup.rotation.y = THREE.MathUtils.degToRad(startAngleDeg);
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({ color }));
    
    // Индивидуальное расстояние от центра Земли
    const dist = (R_EARTH + altitude) * VIEW_SCALE;
    mesh.position.x = dist;
    
    const lineGeom = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(dist,0,0)]);
    const line = new THREE.Line(lineGeom, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.3 }));
    
    satGroup.add(mesh, line);
    orbitPivot.add(satGroup);
    scene.add(orbitPivot);

    // Рассчитываем угловую скорость (omega) по законам физики
    const r_total = R_EARTH + altitude;
    const v_orb = Math.sqrt(GM / r_total); // Первая космическая скорость для этой высоты
    const omega = v_orb / r_total;        // Угловая скорость в рад/с

    return { 
        orbitPivot, 
        satGroup, 
        mesh, 
        color: '#' + color.toString(16).padStart(6, '0'),
        traceSize: traceSize,
        omega: omega // Сохраняем индивидуальную скорость
    };
}

    const satellites = [
    // createSat(цвет, наклон к экватору, толщина следа, высота орбиты, НАЧАЛЬНЫЙ_УГОЛ)
    createSat(0xff4444, 55, 2.8, 20200, 0),   
    createSat(0x4444ff, 55, 0.0, 20200, 90), 
    createSat(0x44ff44, 55, 0.0, 20200, 180),  
    createSat(0x44ff44, 2, 0.2, 35786, 0),  
    createSat(0xffff44, 55, 0.0, 20200, 270)    
];

    let lastTime = performance.now();
    const timeSpeed = 2000; // Ускорение времени для наглядности
function updateClockDisplay() {
    // Используем остаток от деления на 86400 (секунд в сутках), чтобы время шло по кругу
    const daySeconds = totalSimulatedSeconds % 86400;
    const h = Math.floor(daySeconds / 3600).toString().padStart(2, '0');
    const m = Math.floor((daySeconds % 3600) / 60).toString().padStart(2, '0');
    const s = Math.floor(daySeconds % 60).toString().padStart(2, '0');
    
    document.getElementById('clock').innerText = `${h}:${m}:${s}`;
}
    function drawPointOnCanvas(satObj) {
        // Получаем мировую позицию спутника
        const worldPos = new THREE.Vector3();
        satObj.mesh.getWorldPosition(worldPos);

        // Переводим в локальные координаты вращающейся Земли
        const localPos = worldPos.clone().applyMatrix4(earthGroup.matrixWorld.clone().invert());

        // Сферические координаты
        const r = localPos.length();
        const lat = Math.asin(localPos.y / r);
        const lon = Math.atan2(localPos.z, localPos.x);

        // В пиксели канваса (UV проекция)
        const x = (0.5 - lon / (2 * Math.PI)) * canvas.width;
        const y = (0.5 - lat / Math.PI) * canvas.height;

        ctx.fillStyle = satObj.color;
        ctx.beginPath();
        ctx.arc(x, y, satObj.traceSize, 0, Math.PI * 2);
        ctx.fill();
        trackTexture.needsUpdate = true;
    }

    function animate() {
    const now = performance.now();
    const dt = (now - lastTime) / 1000;
    lastTime = now;

    // Если пауза — просто отрисовываем текущий кадр и выходим
    if (isPaused) {
        controls.update();
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
        return; 
    }

    // Рассчитываем шаг времени в симуляции
    const simStep = dt * timeSpeed;
    totalSimulatedSeconds += simStep;

    // Вращение Земли
    earthGroup.rotation.y += OMEGA_EARTH * simStep;

    // Вращение спутников и отрисовка следа
    satellites.forEach(s => {
        s.satGroup.rotation.y += s.omega * simStep;
        drawPointOnCanvas(s);
    });

    updateClockDisplay(); // Обновляем текст часов

    controls.update();
    renderer.render(scene, camera);
    requestAnimationFrame(animate);
}

    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
