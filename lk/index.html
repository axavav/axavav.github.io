<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Auth on GitHub Pages</title>
    <!-- Подключаем библиотеку Supabase через CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <h1>Мой сайт с авторизацией</h1>

    <!-- Блок, который видит неавторизованный пользователь -->
    <div id="auth-logged-out">
        <button id="btn-login">Войти через Google</button>
    </div>

    <!-- Блок, который видит авторизованный пользователь -->
    <div id="auth-logged-in" style="display: none;">
        <img id="user-avatar" src="" alt="Аватар" style="width: 50px; border-radius: 50%;">
        <p>Привет, <span id="user-name"></span>!</p>
        <p>Email: <span id="user-email"></span></p>
        <button id="btn-logout">Выйти</button>
    </div>

    <!-- Подключаем наш файл с логикой -->
    <script src="app.js"></script>
</body>
</html>
